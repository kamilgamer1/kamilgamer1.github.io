<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl glass rounded-2xl shadow-2xl flex flex-col h-[85vh]">
        <!-- Header -->
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-semibold">AI Assistant</h1>
                <p class="text-xs text-slate-400">GPT-3.5 Turbo</p>
            </div>
            <input type="password" id="apiKey" value="sk-abcdef1234567890abcdef1234567890abcdef12" 
                class="bg-slate-800 text-xs p-2 rounded-lg border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 w-48 transition-all">
        </div>

        <!-- Chat Area -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar flex flex-col">
            <div class="bg-blue-600/20 self-start p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm leading-relaxed">
                Hello! Enter your API key above to start chatting safely.
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 border-t border-white/10">
            <div class="flex gap-3">
                <input type="text" id="userInput" placeholder="Type a message..." 
                    class="flex-1 bg-slate-800 p-3 rounded-xl border border-slate-700 focus:outline-none focus:border-blue-500 transition-all text-sm"
                    onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-medium transition-colors text-sm">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const apiKey = document.getElementById('apiKey').value;
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            
            if (!apiKey) return alert("Please enter your OpenAI API key first.");
            if (!input.value.trim()) return;

            const userText = input.value;
            input.value = '';

            // Append User Message
            chatBox.innerHTML += `<div class="bg-slate-700 self-end p-3 rounded-2xl rounded-tr-none ml-auto max-w-[85%] text-sm leading-relaxed">${userText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{role: "user", content: userText}]
                    })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                const aiText = data.choices[0].message.content;

                // Append AI Message
                chatBox.innerHTML += `<div class="bg-blue-600/20 self-start p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm leading-relaxed">${aiText}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<div class="text-red-400 text-xs text-center py-2 italic">Error: ${error.message}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
